{{define "teacher-header"}}
<section class="teacher-header">
  <div class="teacher-header-left">
    <h1 class="teacher-header-title">{{if .HeaderTitle}}{{.HeaderTitle}}{{else}}Admin Tools{{end}}</h1>
    <p class="teacher-header-subtitle">
      {{if .HeaderSubtitle}}{{.HeaderSubtitle}}{{else}}Manage attendance and classroom settings from here.{{end}}
    </p>
  </div>

  <div class="teacher-header-right">
    <form method="POST" action="/logout" class="admin-header-logout">
      <button type="submit" class="admin-logout-btn">Logout</button>
    </form>
  </div>
</section>
{{end}}
