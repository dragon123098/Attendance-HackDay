{{define "base"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>
    {{if .Title}}
      {{.Title}}
    {{else}}
      Attendance Quest Admin
    {{end}}
  </title>

  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/css/admin.css?v=admin-header-logout">
</head>

<body class="admin-shell">

  <div class="admin-layout">
    {{template "admin-navbar" .}}

    <div class="admin-content">
      {{template "teacher-header" .}}

      <main class="admin-main">
        <div class="admin-page-frame">
          {{block "content" .}}{{end}}
        </div>
      </main>
    </div>
  </div>

</body>
</html>
{{end}}
