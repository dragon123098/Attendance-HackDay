{{define "topbar"}}
<header class="topbar">
  <div class="brand">
    <div class="brand-mark">
      {{template "avatarStack" .AvatarPreview}}
    </div>

    <div>
      <div class="brand-title">Attendance Quest</div>
      <div class="brand-subtitle">Show up. Earn coins. Unlock avatars.</div>
    </div>
  </div>

  <div class="user-meta">
    <div class="user-name">{{.Username}}</div>
    <div class="coin-badge">🪙 {{.Coins}}</div>
  </div>

  <form method="POST" action="/logout">
    <button type="submit" class="logout-btn">Logout</button>
  </form>
</header>
{{end}}

{{define "avatarStack"}}
<div class="avatar-stack">
  <img class="avatar-base" src="{{.BaseImage}}" alt="Avatar">
  {{range .Layers}}
  <img class="avatar-layer avatar-layer-{{.Slot}}" src="{{.Image}}" alt="{{.Label}}">
  {{end}}
</div>
{{end}}
