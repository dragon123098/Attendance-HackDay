{{define "content"}}

<div class="admin-page-header">
    <h1>Add Teacher</h1>
    <p>Create a new teacher account.</p>
</div>

<div class="admin-form-card">
    <form method="POST" action="/addTeacher">

        <div class="form-group">
            <label for="user_id">Teacher ID</label>
            <input
                type="text"
                id="user_id"
                name="user_id"
                placeholder="teacher1"
                required>
        </div>

        <div class="form-group">
            <label for="name">Teacher Name</label>
            <input
                type="text"
                id="name"
                name="name"
                placeholder="Test Teacher"
                required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="teacher@example.com"
                required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter a password"
                required>
        </div>

        <button type="submit" class="admin-submit-btn">
            Save Teacher
        </button>
    </form>
</div>

{{end}}

{{template "base" .}}
