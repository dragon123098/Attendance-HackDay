version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: attendance-postgres
    environment:
      POSTGRES_USER: attendance
      POSTGRES_PASSWORD: "Password123!"
      POSTGRES_DB: attendancehackday
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
