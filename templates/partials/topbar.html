{{define "topbar"}}
<header class="topbar">
  <div class="brand">

    <div class="brand-mark">
      <img src="{{.AvatarImage}}" alt="Avatar">
    </div>

    <div>
      <div class="brand-title">Math Adventure</div>
      <div class="brand-subtitle">Learn. Play. Win.</div>
    </div>

  </div>

    <button type="submit" class="logout-btn">
      Logout
    </button>
  </form>

</header>
{{end}}
