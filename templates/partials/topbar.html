{{define "topbar"}}
<header class="topbar">
  <div class="brand">
    <div class="brand-mark">
      <img src="{{.AvatarImage}}" alt="Avatar">
    </div>

    <div>
      <div class="brand-title">Attendance Quest</div>
      <div class="brand-subtitle">Earn coins for great attendance and collect cool avatars!</div>
    </div>
  </div>

  <div class="user-meta">
    <div class="user-name">{{if .Username}}{{.Username}}{{else}}Student{{end}}</div>
    <div class="coin-badge">🪙 {{.Coins}}</div>
  </div>

  <form method="POST" action="/logout">
    <button type="submit" class="logout-btn">
      Logout
    </button>
  </form>
</header>
{{end}}
